<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quem Sou Eu? - Farmacologia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <header>
                <div class="header-top">
                    <h1>🔍 Quem Sou Eu?</h1>
                    <div class="header-controls">
                        <button id="btn-pause" class="pause-btn" title="Pausar jogo">
                            ⏸️
                        </button>
                        <div class="level-badge" id="level-badge">Nível 1</div>
                    </div>
                </div>
                <div class="stats">
                    <div class="stat-card">
                        <span class="stat-icon">📚</span>
                        <span id="tema-label">Tema: <strong id="tema">---</strong></span>
                    </div>
                    <div class="stat-card timer-card">
                        <span class="stat-icon">⏱️</span>
                        <span id="timer">Tempo: <strong id="segundos">20</strong>s</span>
                    </div>
                    <div class="stat-card score-card">
                        <span class="stat-icon">⭐</span>
                        <span id="score">Pontos: 0</span>
                    </div>
                </div>
            </header>

            <main>
                <div class="dicas-container">
                    <div class="dicas-header">
                        <span>💡 Dicas</span>
                        <span id="dicas-count">0/3</span>
                    </div>
                    <div id="caixa-dicas">
                        <ul id="lista-dicas">
                            <li class="dica-placeholder">✨ Aguardando dicas...</li>
                        </ul>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <input type="text" id="resposta-usuario" placeholder="Digite sua resposta..." autocomplete="off">
                        <button id="btn-responder" class="btn-primary">
                            <span>✓</span> Responder
                        </button>
                    </div>
                </div>
                <div id="feedback" class="feedback-message"></div>
            </main>

            <footer>
                <div class="footer-buttons">
                    <button id="btn-proximo" class="btn-next hidden">▶ Próximo Desafio</button>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </footer>
        </div>
    </div>

    <!-- Modal de Pause -->
    <div id="pause-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⏸️ Jogo Pausado</h2>
            </div>
            <div class="modal-body">
                <p>O tempo está parado!</p>
                <div class="pause-info">
                    <span>Desafio atual: <strong id="pause-desafio">---</strong></span>
                    <span>Tempo restante: <strong id="pause-tempo">20</strong>s</span>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-resume" class="btn-resume">▶ Retomar Jogo</button>
                <button id="btn-restart" class="btn-restart">🔄 Reiniciar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
